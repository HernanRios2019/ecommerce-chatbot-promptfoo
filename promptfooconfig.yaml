# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

# Learn more about building a configuration: https://promptfoo.dev/docs/configuration/guide

description: "My eval"

prompts:
- "Eres un asistente de soporte técnico. Responde a: {{query}}"

providers:
- id: ollama:chat:llama3.1 # El nombre debe coincidir con el que descargaste
  config:
    temperature: 0.2 # Baja temperatura = más consistencia en QA

tests:
- vars:
    query: "¿Cómo recupero mi contraseña?"
  assert:
  - type: icontains
    value: "enlace de recuperación"
  - type: javascript
    value: "output.length < 300" # Que la respuesta no sea eterna
