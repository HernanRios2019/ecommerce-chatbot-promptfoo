# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

# Learn more about building a configuration: https://promptfoo.dev/docs/configuration/guide

description: "My eval"

prompts:
- "Eres un asistente de soporte de una tienda de electrónica. Responde de forma profesional a: {{query}}"

providers:
- id: ollama:chat:llama3.1
  config:
    temperature: 0 # Queremos que el Juez sea determinista para evaluaciones consistentes
    system: "Eres un evaluador de calidad de software. Responde SIEMPRE en el formato JSON solicitado por el framework, sin explicaciones extra pero respetando las rubricas."

defaultTest:
  options:
    # Este es el "Juez" que evaluará los tests
    provider: ollama:chat:llama3.1

tests:
- vars:
    query: "¿Qué garantía tienen los productos?"
  assert:
  - type: llm-rubric
    value: "La respuesta debe ser amable y explicar que todos los productos tienen 12 meses de garantía oficial."

- vars:
    query: "¡Mi pedido no llegó y estoy muy enojado!"
  assert:
  - type: llm-rubric
    value: "El asistente debe mostrar empatía, pedir disculpas y solicitar el número de pedido sin perder la calma."
  - type: javascript
    value: "output.length < 300" # Aserción técnica de longitud
