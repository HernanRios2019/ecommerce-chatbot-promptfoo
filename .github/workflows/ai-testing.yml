name: AI Automation CI

on:
  push:
    branches: [ main, ci-cd-integration ]
  pull_request:
    branches: [ main ]

jobs:
  ai-eval:
    runs-on: ubuntu-latest
    env:
      # Optamos por Node 24 para limpiar las advertencias de GitHub
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Actualizado para 2026

      - name: Install dependencies
        run: npm install

      - name: Install and Start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve & 
          sleep 15 # Damos un poco más de tiempo en la nube
          ollama pull llama3.1

      - name: Run AI Evaluations
        # El "|| true" asegura que el proceso siga para subir el reporte aunque un test falle
        run: npm run test:ai || true
        env:
          PROMPTFOO_DISABLE_TELEMETRY: 1

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-report
          path: output/